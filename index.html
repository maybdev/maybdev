<style>
  @font-face {
      font-family: 'p8';
      src: url('font\\PICO-8.ttf') format('truetype');
  }

  .center {
    display: flex;
    justify-content: center;
    margin-top: 10%;
  }

  .pfp {
    max-width: 256px;
    max-height: 256px;
    width: 256px;
    height: 256px;
    margin-top: 30px;
    cursor: url("cur\\pointer_up.png"), default;
  }

  .pft {
    font-family: "p8";
    font-size: 40px;
    color: #291814;
  }

  .pfst {
    font-family: "p8";
    font-size: 15px;
    color: #291814;
  }

  .pfp8 {
    font-family: "p8";
    font-size: 10px;
    color: #291814;
  }

  html,body {
    user-select: none;
    background-color: floralwhite;
    cursor: url("cur\\mouse.png"), default;
  }
</style>

<link rel="icon" href="img\\maybdev.png">

<title>maybdev</title>

<div class="center">
  <img class="pfp" src="img\\maybdev.png" draggable="false" id="pfp">
  <div>
    <p class="pft">maybdev L</p>
    <p class="pfst">hi, maybdev here!</p><br>
    <p class="pfp8" style="color: #111D35; font-size: 15px;">(fav langs)</p>
    <p class="pfp8" id="rust" style="color: #1D2B53;">rust</p>
    <p class="pfp8" id="c++">c++</p>
    <p class="pfp8" id="picotron">lua</p>
    <p class="pfp8" id="python">python</p>
    <p class="pfp8" id="javascript">javascript</p>
  </div>
</div>

<script>
  document.addEventListener('contextmenu', function(event) {
      event.preventDefault();
  });

  document.getElementById("pfp").addEventListener('mousedown', () => {
    document.getElementById("pfp").style.cursor = 'url("cur/pointer_down.png"), default';
  });

  document.getElementById("pfp").addEventListener('mouseup', () => {
    document.getElementById("pfp").style.cursor = 'url("cur/pointer_up.png"), default';
  });
</script>
